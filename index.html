<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title id="page-title">Детские занятия</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Clash Display via CDN -->
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@700,600,500&display=swap">

    <style>
        /* ======================================================
           RESET & BASE
           ====================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: #0A0A0F; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; color: #F0EEE8; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        ::-webkit-scrollbar { display: none; }

        /* ======================================================
           CSS VARIABLES — тема (применяются из CONFIG.theme в JS)
           ====================================================== */
        :root {
            --bg:         #0A0A0F;
            --card:       #111116;
            --lime:       #C8FF00;
            --muted:      #52525B;
            --text:       #F0EEE8;
            --border:     rgba(255,255,255,0.06);
            --font-clash: 'Clash Display', sans-serif;
            --font-inter: 'Inter', sans-serif;
        }

        /* ======================================================
           APP SHELL
           ====================================================== */
        #app {
            position: relative;
            width: min(390px, 100vw);
            height: min(844px, 100dvh);
            margin: 0 auto;
            background: var(--bg);
            border-radius: clamp(0px, 4vw, 40px);
            overflow: hidden;
            box-shadow: 0 64px 128px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.07);
        }

        /* ======================================================
           SCREENS
           ====================================================== */
        .screen {
            position: absolute; inset: 0;
            overflow-y: auto; overflow-x: hidden;
            scroll-behavior: smooth;
            display: none;
        }
        .screen.active { display: block; }

        @keyframes screenEnter {
            from { opacity: 0; transform: scale(1.04); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes screenExit {
            from { opacity: 1; transform: scale(1); }
            to   { opacity: 0; transform: scale(0.92); }
        }
        @keyframes titleReveal {
            from { clip-path: inset(0 100% 0 0); }
            to   { clip-path: inset(0 0% 0 0); }
        }
        @keyframes cardSlide {
            from { opacity: 0; transform: translateY(48px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .anim-title    { animation: titleReveal 700ms cubic-bezier(0.16,1,0.3,1) both; }
        .anim-card-1   { animation: cardSlide 600ms cubic-bezier(0.16,1,0.3,1) 100ms both; }
        .anim-card-2   { animation: cardSlide 600ms cubic-bezier(0.16,1,0.3,1) 220ms both; }
        .anim-card-3   { animation: cardSlide 600ms cubic-bezier(0.16,1,0.3,1) 340ms both; }
        .anim-card-4   { animation: cardSlide 600ms cubic-bezier(0.16,1,0.3,1) 460ms both; }

        /* ======================================================
           TYPOGRAPHY HELPERS
           ====================================================== */
        .clash { font-family: var(--font-clash); }
        .muted { color: var(--muted); }
        .label-xs { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-family: var(--font-inter); }

        /* ======================================================
           CARDS
           ====================================================== */
        .card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
        }
        .card-lg { border-radius: 18px; }

        /* ======================================================
           NAV DOTS (вертикальные, справа)
           ====================================================== */
        #nav-dots {
            position: absolute;
            right: 18px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
            z-index: 100;
        }
        #nav-dots button {
            padding: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        #nav-dots .dot {
            height: 4px; border-radius: 2px;
            background: rgba(82,82,91,0.7);
            transition: all 300ms cubic-bezier(0.34,1.56,0.64,1);
            width: 4px;
        }
        #nav-dots button.active .dot {
            width: 18px;
            background: var(--lime);
        }

        /* ======================================================
           ADD / BOOK BUTTON (нижний левый)
           ====================================================== */
        #add-btn {
            position: absolute;
            bottom: 28px; left: 20px;
            width: 56px; height: 36px;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            transition: background 200ms;
        }
        #add-btn:hover { background: rgba(200,255,0,0.12); }
        #add-btn span { color: var(--lime); font-size: 22px; font-weight: 300; line-height: 1; }

        /* ======================================================
           HOME SCREEN
           ====================================================== */
        #screen-home .content { padding: 48px 24px 100px; position: relative; z-index: 1; }
        #screen-home .glow-blob {
            position: absolute;
            top: 8%; right: -25%;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,255,0,0.055) 0%, transparent 68%);
            filter: blur(48px);
            pointer-events: none; z-index: 0;
        }

        /* active child card */
        #screen-home .child-card-main {
            position: relative;
            background: var(--card);
            border-radius: 18px;
            height: 180px;
            padding: 22px 24px;
            overflow: visible;
            cursor: pointer;
            z-index: 1;
        }
        /* second child mini-card */
        #screen-home .child-card-mini {
            position: absolute;
            bottom: -72px; right: 28px;
            width: 42%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            z-index: 10;
            cursor: pointer;
        }
        /* arc progress svg wrapper */
        #screen-home .arc-wrap {
            position: absolute;
            right: -8px; top: -16px;
            pointer-events: none;
        }
        /* avatar overflow */
        #screen-home .child-avatar {
            position: absolute;
            right: -12px; bottom: -20px;
            width: 76px; height: 76px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--bg);
            z-index: 5;
        }
        /* today lesson card */
        #screen-home .today-card {
            position: relative;
            background: var(--card);
            border-radius: 18px;
            height: 148px;
            overflow: hidden;
            cursor: pointer;
        }
        #screen-home .today-ghost {
            position: absolute; inset: 0;
            display: flex; align-items: center;
            padding-left: 20px;
            pointer-events: none;
        }
        #screen-home .today-ghost span {
            font-size: 88px;
            font-family: var(--font-clash);
            font-weight: 700;
            color: rgba(240,238,232,0.05);
            letter-spacing: -3px;
            white-space: nowrap;
            line-height: 1;
            user-select: none;
        }

        /* ======================================================
           SCHEDULE SCREEN
           ====================================================== */
        #screen-schedule .content { padding: 48px 24px 100px; }

        .view-toggle { display: flex; gap: 28px; margin-bottom: 28px; }
        .view-toggle button {
            font-family: var(--font-inter);
            font-size: 15px;
            color: var(--muted);
            background: none; border: none;
            border-bottom: 1.5px solid transparent;
            padding-bottom: 5px;
            transition: all 220ms;
        }
        .view-toggle button.active {
            color: var(--text);
            font-weight: 500;
            border-bottom-color: var(--lime);
        }

        .day-strip { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 28px; }
        .day-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; background: none; border: none; cursor: pointer; padding: 0; }
        .day-btn .day-l { font-size: 11px; color: var(--muted); font-family: var(--font-inter); letter-spacing: 0.04em; transition: color 200ms; }
        .day-btn .day-d { font-size: 15px; font-family: var(--font-clash); font-weight: 600; color: var(--muted); transition: color 200ms; }
        .day-btn .day-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; transition: background 200ms; }
        .day-btn.active .day-l,
        .day-btn.active .day-d { color: var(--lime); }
        .day-btn.active .day-dot { background: var(--lime); }

        .lesson-card-primary {
            background: var(--card);
            border-radius: 14px;
            padding: 20px 22px;
            margin-bottom: 16px;
        }
        .lesson-row {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .lesson-row:last-child { border-bottom: none; }
        .lesson-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.12); flex-shrink: 0; }

        /* ======================================================
           TRAINER SCREEN
           ====================================================== */
        #screen-trainer .photo-zone {
            position: relative;
            height: 34vh; min-height: 240px;
            background: var(--card);
            overflow: hidden;
        }
        #screen-trainer .photo-zone img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }
        #screen-trainer .photo-lime-overlay {
            position: absolute; inset: 0;
            background: rgba(200,255,0,0.08);
            mix-blend-mode: screen;
        }
        #screen-trainer .photo-fade {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(10,10,15,0) 40%, #0A0A0F 100%);
        }
        #screen-trainer .trainer-name {
            position: absolute; bottom: 0; left: 24px; right: 40px;
        }
        #screen-trainer .trainer-spec {
            position: absolute;
            right: 16px; bottom: 32px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }
        #screen-trainer .trainer-content { padding: 28px 24px 96px; }
        #screen-trainer .stats-row { display: flex; gap: 32px; margin-bottom: 28px; }
        #screen-trainer .stat-num {
            font-size: 40px;
            font-family: var(--font-clash);
            font-weight: 700;
            color: var(--lime);
            letter-spacing: -1.5px;
            line-height: 1;
        }
        #screen-trainer .rating-card {
            background: var(--card);
            border-radius: 14px;
            padding: 20px 22px;
        }
        #screen-trainer .rating-bars { display: flex; gap: 6px; margin-top: 12px; }
        #screen-trainer .rating-bar { flex: 1; height: 3px; border-radius: 2px; }

        /* ======================================================
           BOOKING SCREEN
           ====================================================== */
        #screen-booking .content { padding: 48px 24px 96px; }

        .time-slot {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%;
            padding: 15px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            border-radius: 0;
            transition: all 220ms cubic-bezier(0.16,1,0.3,1);
        }
        .time-slot.selected {
            padding: 15px 16px;
            background: var(--lime);
            border-bottom: none;
            border-radius: 10px;
        }
        .time-slot .slot-time {
            font-size: 24px;
            font-family: var(--font-clash);
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text);
            transition: color 220ms;
        }
        .time-slot.selected .slot-time { color: #0A0A0F; }
        .time-slot.disabled .slot-time { color: var(--muted); }
        .time-slot .slot-label {
            font-size: 11px;
            font-family: var(--font-inter);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            transition: color 220ms;
        }
        .time-slot.selected .slot-label { color: #0A0A0F; }

        #confirm-btn {
            margin-top: 28px;
            width: 100%;
            padding: 18px;
            background: var(--lime);
            border: none;
            border-radius: 12px;
            transition: all 300ms;
            display: none;
        }
        #confirm-btn.visible { display: block; animation: fadeIn 300ms ease both; }
        #confirm-btn.confirmed {
            background: rgba(200,255,0,0.15);
            border: 1px solid var(--lime);
        }
        #confirm-btn span {
            font-size: 15px;
            font-family: var(--font-clash);
            font-weight: 700;
            letter-spacing: -0.2px;
            color: #0A0A0F;
        }
        #confirm-btn.confirmed span { color: var(--lime); }

        /* booking form fields */
        #booking-form { margin-top: 28px; animation: cardSlide 350ms cubic-bezier(0.16,1,0.3,1) both; }
        #booking-form label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
        #booking-form input, #booking-form select, #booking-form textarea {
            width: 100%;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 13px 14px;
            color: var(--text);
            font-family: var(--font-inter);
            font-size: 15px;
            margin-bottom: 18px;
            transition: border-color 200ms;
            -webkit-appearance: none;
        }
        #booking-form input:focus, #booking-form select:focus, #booking-form textarea:focus {
            outline: none;
            border-color: var(--lime);
        }
        #booking-form select option { background: #1a1a22; }
        #booking-form textarea { resize: none; height: 80px; }

        /* ======================================================
           NOTIFICATION (toast)
           ====================================================== */
        #toast {
            position: absolute;
            bottom: 80px; left: 20px; right: 20px;
            background: var(--card);
            border: 1px solid var(--lime);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 12px;
            z-index: 200;
            transform: translateY(20px);
            opacity: 0;
            transition: all 300ms cubic-bezier(0.16,1,0.3,1);
            pointer-events: none;
        }
        #toast.visible { transform: translateY(0); opacity: 1; }
        #toast .toast-icon { color: var(--lime); font-size: 18px; flex-shrink: 0; }
        #toast .toast-text { font-size: 13px; color: var(--text); line-height: 1.45; }
        #toast .toast-text strong { color: var(--lime); }

        /* ======================================================
           ARC PROGRESS SVG (inline-draw, controlled by JS)
           ====================================================== */
        #arc-svg { display: block; }
    </style>
</head>
<body>

<div id="app">

    <!-- ─────────── AMBIENT GLOW ─────────── -->
    <div style="position:absolute;inset:-40px;background:radial-gradient(ellipse at 70% 20%,rgba(200,255,0,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;"></div>

    <!-- ─────────── HOME ─────────── -->
    <div id="screen-home" class="screen active">
        <div class="glow-blob"></div>
        <div class="content">
            <!-- date -->
            <p class="label-xs anim-title" id="home-date" style="margin-bottom:6px;"></p>

            <!-- greeting -->
            <div style="overflow:visible;margin-bottom:36px;">
                <h1 id="home-greeting" class="clash anim-title" style="font-size:clamp(40px,12vw,52px);font-weight:700;color:var(--text);letter-spacing:-2px;line-height:1.05;white-space:nowrap;"></h1>
            </div>

            <!-- children cards -->
            <div style="position:relative;margin-bottom:108px;" class="anim-card-1">
                <!-- main child card -->
                <div class="child-card-main" id="main-child-card" onclick="navigate(3)">
                    <p class="label-xs" style="margin-bottom:4px;">Активный</p>
                    <h2 id="child1-name" class="clash" style="font-size:34px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--text);"></h2>
                    <p id="child1-age" style="font-size:13px;color:var(--muted);margin-top:4px;"></p>
                    <!-- arc -->
                    <div class="arc-wrap">
                        <svg id="arc-svg" width="192" height="192" viewBox="0 0 192 192" style="overflow:visible;">
                            <path id="arc-track" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2" stroke-linecap="round"/>
                            <path id="arc-progress" fill="none" stroke="#C8FF00" stroke-width="2.5" stroke-linecap="round"/>
                            <text id="arc-value" x="96" y="102" text-anchor="middle" fill="#C8FF00" font-size="44" font-weight="700" font-family="'Clash Display',sans-serif" letter-spacing="-2"></text>
                            <text x="96" y="120" text-anchor="middle" fill="#52525B" font-size="9.5" font-family="Inter,sans-serif" letter-spacing="1.5">ЗАНЯТИЙ</text>
                        </svg>
                    </div>
                    <!-- avatar -->
                    <div class="child-avatar">
                        <img id="child1-avatar" src="" alt="" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                </div>

                <!-- second child mini card (hidden if only 1 child) -->
                <div class="child-card-mini anim-card-2" id="child2-card" onclick="navigate(3)" style="display:none;">
                    <p class="label-xs" style="margin-bottom:2px;" id="child2-label"></p>
                    <p id="child2-section" class="clash" style="font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--text);"></p>
                    <p id="child2-lessons" style="font-size:11px;color:var(--muted);margin-top:3px;"></p>
                </div>
            </div>

            <!-- today -->
            <p class="label-xs" style="margin-bottom:14px;">Сегодня</p>
            <div class="today-card anim-card-3" onclick="navigate(1)">
                <div class="today-ghost"><span id="today-ghost-text"></span></div>
                <div style="position:relative;z-index:1;padding:22px 52px 22px 24px;">
                    <h2 id="today-section" class="clash" style="font-size:58px;font-weight:700;color:var(--text);letter-spacing:-2.5px;line-height:1;white-space:nowrap;"></h2>
                </div>
                <!-- trainer bottom-left -->
                <div style="position:absolute;bottom:20px;left:24px;display:flex;align-items:center;gap:8px;z-index:1;">
                    <div style="width:26px;height:26px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card);">
                        <img id="today-trainer-photo" src="" alt="" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                    <span id="today-trainer-name" style="font-size:12px;color:var(--muted);"></span>
                </div>
                <!-- time rotated right -->
                <div style="position:absolute;right:18px;top:50%;transform:translateY(-50%) rotate(90deg);z-index:1;">
                    <span id="today-time" class="clash" style="font-size:17px;color:var(--muted);font-weight:600;letter-spacing:0.04em;"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ─────────── SCHEDULE ─────────── -->
    <div id="screen-schedule" class="screen">
        <div class="content">
            <h1 class="clash anim-title" style="font-size:clamp(40px,12vw,52px);font-weight:700;color:var(--text);letter-spacing:-2px;line-height:1.05;margin-bottom:28px;">Расписание</h1>

            <div class="view-toggle">
                <button class="active" onclick="setScheduleView('week',this)">Неделя</button>
                <button onclick="setScheduleView('month',this)">Месяц</button>
            </div>

            <div class="day-strip" id="day-strip"></div>

            <div id="lessons-list"></div>
        </div>
    </div>

    <!-- ─────────── TRAINER ─────────── -->
    <div id="screen-trainer" class="screen">
        <!-- photo -->
        <div class="photo-zone">
            <img id="trainer-photo" src="" alt="">
            <div class="photo-lime-overlay"></div>
            <div class="photo-fade"></div>
            <div class="trainer-name">
                <h1 id="trainer-name-text" class="clash anim-title" style="font-size:clamp(36px,9vw,48px);font-weight:700;color:var(--text);letter-spacing:-1.5px;line-height:1;"></h1>
            </div>
            <div class="trainer-spec">
                <span id="trainer-spec-text" style="font-size:10px;color:var(--muted);font-family:var(--font-inter);letter-spacing:0.14em;text-transform:uppercase;"></span>
            </div>
        </div>

        <div class="trainer-content" style="overflow-y:auto;height:calc(100% - 34vh);">
            <div class="stats-row anim-card-1">
                <div style="display:flex;align-items:baseline;gap:8px;">
                    <span id="trainer-exp" class="stat-num"></span>
                    <span style="font-size:13px;color:var(--muted);">лет опыта</span>
                </div>
                <div style="display:flex;align-items:baseline;gap:8px;">
                    <span id="trainer-age-range" class="stat-num"></span>
                    <span style="font-size:13px;color:var(--muted);">лет ученики</span>
                </div>
            </div>

            <div style="height:1px;background:var(--border);margin-bottom:24px;"></div>

            <p id="trainer-bio" style="font-size:15px;color:var(--muted);line-height:1.72;margin-bottom:28px;" class="anim-card-2"></p>

            <div class="rating-card anim-card-3">
                <div style="display:flex;align-items:baseline;gap:10px;">
                    <span id="trainer-rating" class="clash" style="font-size:42px;font-weight:700;color:var(--lime);letter-spacing:-1.5px;line-height:1;"></span>
                    <span style="font-size:13px;color:var(--muted);">средняя оценка</span>
                </div>
                <div class="rating-bars" id="rating-bars"></div>
            </div>
        </div>
    </div>

    <!-- ─────────── BOOKING ─────────── -->
    <div id="screen-booking" class="screen">
        <div class="content">
            <p class="label-xs" style="margin-bottom:6px;">Запись</p>
            <h1 id="booking-title" class="clash anim-title" style="font-size:clamp(52px,16vw,72px);font-weight:700;color:var(--text);letter-spacing:-2.5px;line-height:1;white-space:nowrap;overflow:visible;margin-bottom:6px;"></h1>
            <p id="booking-subtitle" style="font-size:14px;color:var(--muted);margin-bottom:36px;"></p>

            <!-- time slots -->
            <div id="time-slots"></div>

            <!-- form (appears after slot selected) -->
            <div id="booking-form" style="display:none;">
                <label>Ребёнок</label>
                <select id="form-child"></select>

                <label>Телефон для подтверждения</label>
                <input id="form-phone" type="tel" placeholder="+7 (999) 123-45-67">

                <label>Комментарий (необязательно)</label>
                <textarea id="form-comment" placeholder="Пожелания или вопросы..."></textarea>

                <button id="confirm-btn" class="visible" onclick="submitBooking()">

    <!-- ─────────── TOAST ─────────── -->

        <div class="toast-icon">✓</div>
        <div class="toast-text" id="toast-text"></div>
    </div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
/* =====================================================================

            time: '17:00',

            lessonsLeft: 5,

    schedule: [
        { day: 0, time: '10:00', section: 'ФУТБОЛ',     trainer: 'А. Козлов',    primary: true  },
        { day: 0, time: '12:30', section: 'ПЛАВАНИЕ',   trainer: 'И. Морозова',  primary: false },
        { day: 0, time: '15:00', section: 'ГИМНАСТИКА', trainer: 'Е. Петрова',   primary: false },
        { day: 0, time: '17:00', section: 'ФУТБОЛ',     trainer: 'А. Козлов',    primary: false },
        { day: 2, time: '10:00', section: 'ФУТБОЛ',     trainer: 'А. Козлов',    primary: true  },
        { day: 2, time: '15:00', section: 'ГИМНАСТИКА', trainer: 'Е. Петрова',   primary: false },
        { day: 4, time: '10:00', section: 'ФУТБОЛ',     trainer: 'А. Козлов',    primary: true  },
        { day: 4, time: '12:30', section: 'ПЛАВАНИЕ',   trainer: 'И. Морозова',  primary: false },

    trainers: [
        {
            name: 'Алексей\nКозлов',

            spec: 'ФУТБОЛ · СПОРТ',
            experience: 8,
            ageRange: '6–14',
            bio: 'Тренер высшей категории. Специализация — детский футбол и командная тактика. Чемпион города по юношескому футболу 2019, мастер спорта.',
            rating: 4.9
        }
    ],

    // Слоты для записи. free: true — доступен
    timeSlots: [
        { time: '09:00', free: false },
        { time: '10:30', free: true  },
        { time: '12:00', free: true  },
        { time: '14:00', free: false },
        { time: '15:30', free: true  },
        { time: '17:00', free: false },
        { time: '18:30', free: true  },
        { time: '20:00', free: true  },
    ],

    // Для экрана "Запись": секция и тренер (откуда пишем)
    bookingSection: 'ФУТБОЛ',
    bookingTrainer: 'А. Козлов',

    // Тема (CSS-переменные)
    theme: {
        bg:     '#0A0A0F',
        card:   '#111116',
        lime:   '#C8FF00',
        muted:  '#52525B',
        text:   '#F0EEE8',
    }
};
/* =====================================================================
 *  КОНЕЦ CONFIG. Дальше — общий движок, одинаковый для всех клиентов.
 * ===================================================================== */

// ── Применяем тему ────────────────────────────────────────────────────
(function applyTheme() {
    const t = CONFIG.theme;
    const r = document.documentElement;
    r.style.setProperty('--bg',    t.bg);
    r.style.setProperty('--card',  t.card);
    r.style.setProperty('--lime',  t.lime);
    r.style.setProperty('--muted', t.muted);
    r.style.setProperty('--text',  t.text);
})();

document.getElementById('page-title').textContent = CONFIG.pageTitle;

// ── Telegram WebApp init ──────────────────────────────────────────────
if (window.Telegram?.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
}

// ── State ─────────────────────────────────────────────────────────────
const state = {
    activeScreen: 0,
    scheduleView: 'week',
    activeDayIdx: 0,
    selectedSlot: null,
    submitting: false,
    submitted: false
};

const SCREENS = ['home', 'schedule', 'trainer', 'booking'];

// ── Navigation ────────────────────────────────────────────────────────
function navigate(idx) {
    if (idx === state.activeScreen) return;
    const prev = document.getElementById('screen-' + SCREENS[state.activeScreen]);
    const next = document.getElementById('screen-' + SCREENS[idx]);
    const navBtns = document.querySelectorAll('#nav-dots button');

    prev.classList.remove('active');
    prev.style.animation = 'screenExit 280ms ease-in both';
    setTimeout(() => { prev.style.animation = ''; }, 290);

    next.classList.add('active');
    next.style.animation = 'screenEnter 500ms cubic-bezier(0.16,1,0.3,1) both';
    setTimeout(() => { next.style.animation = ''; }, 510);

    navBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
    state.activeScreen = idx;

    // refresh per-screen
    if (idx === 1) renderSchedule();
    if (idx === 2) renderTrainer();
    if (idx === 3) renderBooking();
}

// ── HOME ──────────────────────────────────────────────────────────────
function renderHome() {
    // date
    const now = new Date();
    const days = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];
    const months = ['ЯНВАРЯ','ФЕВРАЛЯ','МАРТА','АПРЕЛЯ','МАЯ','ИЮНЯ','ИЮЛЯ','АВГУСТА','СЕНТЯБРЯ','ОКТЯБРЯ','НОЯБРЯ','ДЕКАБРЯ'];
    document.getElementById('home-date').textContent =
        `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

    document.getElementById('home-greeting').textContent = `Привет, ${CONFIG.parentName}`;

    // child 1
    const c1 = CONFIG.children[0];
    document.getElementById('child1-name').textContent = c1.name;
    document.getElementById('child1-age').textContent = `${c1.age} лет`;
    document.getElementById('child1-avatar').src = c1.avatar || 'https://images.unsplash.com/photo-1545558014-8692077e9b5c?w=160&h=160&fit=crop&auto=format';
    document.getElementById('child1-avatar').alt = c1.name;

    // arc
    renderArc(c1.lessonsLeft, c1.lessonsTotal);

    // child 2
    if (CONFIG.children.length > 1) {
        const c2 = CONFIG.children[1];
        const card2 = document.getElementById('child2-card');
        card2.style.display = 'block';
        document.getElementById('child2-label').textContent = `${c2.name} · ${c2.age} лет`;
        document.getElementById('child2-section').textContent = c2.section;
        document.getElementById('child2-lessons').textContent = `${c2.lessonsLeft} занятий`;
    }

    // today card
    document.getElementById('today-ghost-text').textContent = c1.section;
    document.getElementById('today-section').textContent = c1.section;
    document.getElementById('today-time').textContent = c1.time;

    const t0 = CONFIG.trainers[0];
    document.getElementById('today-trainer-photo').src = t0.photo;
    document.getElementById('today-trainer-name').textContent = t0.name.replace('\n', ' ');
}

// ── ARC PROGRESS ─────────────────────────────────────────────────────
function renderArc(value, total) {
    const r = 66, cx = 96, cy = 96;
    function toXY(deg) {
        const rad = ((deg - 90) * Math.PI) / 180;
        return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }
    const start = toXY(225);
    const end   = toXY(135);
    const d = `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 1 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
    const arcLen = r * (270 * Math.PI) / 180;
    const progress = value / total;
    const dashOffset = arcLen * (1 - progress);

    document.getElementById('arc-track').setAttribute('d', d);
    document.getElementById('arc-progress').setAttribute('d', d);
    document.getElementById('arc-progress').setAttribute('stroke-dasharray', arcLen);
    document.getElementById('arc-progress').setAttribute('stroke-dashoffset', arcLen); // start at 0
    document.getElementById('arc-value').textContent = value;

    // animate after paint
    requestAnimationFrame(() => {
        setTimeout(() => {
            document.getElementById('arc-progress').style.transition = 'stroke-dashoffset 1100ms cubic-bezier(0.34,1.56,0.64,1)';
            document.getElementById('arc-progress').setAttribute('stroke-dashoffset', dashOffset);
        }, 300);
    });
}

// ── SCHEDULE ─────────────────────────────────────────────────────────
function renderSchedule() {
    // build week days anchored to today
    const today = new Date();
    const todayDow = today.getDay(); // 0=вс,1=пн...
    // Monday-based week offset
    const mondayOffset = todayDow === 0 ? -6 : 1 - todayDow;
    const DAY_LETTERS = ['П','В','С','Ч','П','С','В']; // пн..вс

    const strip = document.getElementById('day-strip');
    strip.innerHTML = '';

    // которой индекс по умолчанию = сегодня
    let todayIdx = todayDow === 0 ? 6 : todayDow - 1;
    if (state.activeDayIdx === 0) state.activeDayIdx = todayIdx;

    for (let i = 0; i < 7; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() + mondayOffset + i);
        const btn = document.createElement('button');
        btn.className = 'day-btn' + (i === state.activeDayIdx ? ' active' : '');
        btn.innerHTML = `
            <span class="day-l">${DAY_LETTERS[i]}</span>
            <span class="day-d">${date.getDate()}</span>
            <div class="day-dot"></div>`;
        btn.onclick = () => { state.activeDayIdx = i; renderSchedule(); };
        strip.appendChild(btn);
    }

    // lessons for active day (0=пн)
    const daySchedule = CONFIG.schedule.filter(l => l.day === state.activeDayIdx);
    const list = document.getElementById('lessons-list');
    list.innerHTML = '';

    if (daySchedule.length === 0) {
        list.innerHTML = `<p style="color:var(--muted);font-size:15px;padding:20px 0;">Занятий нет</p>`;
        return;
    }

    daySchedule.forEach((lesson, i) => {
        const delay = i * 80 + 80;
        if (lesson.primary) {
            list.innerHTML += `
            <div class="lesson-card-primary" style="animation:cardSlide 500ms cubic-bezier(0.16,1,0.3,1) ${delay}ms both;">
                <p class="label-xs" style="margin-bottom:6px;">${lesson.time}</p>
                <h3 class="clash" style="font-size:32px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;">${lesson.section}</h3>
                <p style="font-size:13px;color:var(--muted);margin-top:6px;">${lesson.trainer}</p>
            </div>`;
        } else {
            list.innerHTML += `
            <div class="lesson-row" style="animation:cardSlide 500ms cubic-bezier(0.16,1,0.3,1) ${delay}ms both;">
                <span style="font-size:14px;color:var(--muted);min-width:44px;">${lesson.time}</span>
                <div class="lesson-divider"></div>
                <span class="clash" style="font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.4px;flex:1;">${lesson.section}</span>
                <div class="lesson-divider"></div>
                <span style="font-size:12px;color:var(--muted);">${lesson.trainer}</span>
            </div>`;
        }
    });
}

function setScheduleView(v, btn) {
    state.scheduleView = v;
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSchedule();
}

// ── TRAINER ───────────────────────────────────────────────────────────
function renderTrainer() {
    const t = CONFIG.trainers[0];
    document.getElementById('trainer-photo').src = t.photo;
    document.getElementById('trainer-photo').alt = t.name.replace('\n',' ');
    document.getElementById('trainer-name-text').innerHTML = t.name.replace('\n','<br>');
    document.getElementById('trainer-spec-text').textContent = t.spec;
    document.getElementById('trainer-exp').textContent = t.experience;
    document.getElementById('trainer-age-range').textContent = t.ageRange;
    document.getElementById('trainer-bio').textContent = t.bio;
    document.getElementById('trainer-rating').textContent = t.rating;

    // rating bars (filled based on rating/5)
    const bars = document.getElementById('rating-bars');
    bars.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
        const bar = document.createElement('div');
        bar.className = 'rating-bar';
        const pct = t.rating / 5;
        bar.style.background = i / 5 <= pct ? 'var(--lime)' : 'rgba(200,255,0,0.2)';
        bars.appendChild(bar);
    }
}

// ── BOOKING ───────────────────────────────────────────────────────────
function renderBooking() {
    // today's date for subtitle
    const today = new Date();
    const DAY_NAMES = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const MONTH_NAMES = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    const dateStr = `${DAY_NAMES[today.getDay()]}, ${today.getDate()} ${MONTH_NAMES[today.getMonth()]}`;

    document.getElementById('booking-title').textContent = CONFIG.bookingSection;
    document.getElementById('booking-subtitle').textContent = `${dateStr} · ${CONFIG.bookingTrainer}`;

    // time slots
    const slotsEl = document.getElementById('time-slots');
    slotsEl.innerHTML = '';
    CONFIG.timeSlots.forEach((slot, i) => {
        const btn = document.createElement('button');
        const isSel = state.selectedSlot === slot.time;
        btn.className = 'time-slot' + (isSel ? ' selected' : '') + (!slot.free ? ' disabled' : '');
        btn.style.animation = `cardSlide 450ms cubic-bezier(0.16,1,0.3,1) ${i * 45 + 80}ms both`;
        btn.innerHTML = `
            <span class="slot-time">${slot.time}</span>
            <span class="slot-label">${slot.free ? 'свободно' : 'занято'}</span>`;
        if (slot.free) {
            btn.onclick = () => {
                state.selectedSlot = isSel ? null : slot.time;
                state.submitted = false;
                renderBookingSlots();
                updateBookingForm();
            };
        }
        slotsEl.appendChild(btn);
    });

    updateBookingForm();

    // populate child selector
    const sel = document.getElementById('form-child');
    sel.innerHTML = '';
    CONFIG.children.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.name;
        opt.textContent = `${c.name}, ${c.age} лет · ${c.section}`;
        sel.appendChild(opt);
    });

    // pre-fill phone from Telegram
    const tg = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (tg?.phone_number && !document.getElementById('form-phone').value) {
        document.getElementById('form-phone').value = tg.phone_number;
    }
}

function renderBookingSlots() {
    // just re-render slot classes without animation
    const buttons = document.querySelectorAll('#time-slots .time-slot');
    buttons.forEach((btn, i) => {
        const slot = CONFIG.timeSlots[i];
        const isSel = state.selectedSlot === slot.time;
        btn.className = 'time-slot' + (isSel ? ' selected' : '') + (!slot.free ? ' disabled' : '');
        btn.style.animation = '';
    });
}

function updateBookingForm() {
    const form = document.getElementById('booking-form');
    if (!state.selectedSlot) { form.style.display = 'none'; return; }
    form.style.display = 'block';
    const btn = document.getElementById('confirm-btn');
    const btnText = document.getElementById('confirm-btn-text');
    if (state.submitted) {
        btn.className = 'visible confirmed';
        btnText.textContent = `✓ Записано на ${state.selectedSlot}`;
    } else {
        btn.className = 'visible';
        btnText.textContent = `Записать на ${state.selectedSlot}`;
    }
}

// ── SUBMIT BOOKING ────────────────────────────────────────────────────
function submitBooking() {
    if (state.submitting || state.submitted) return;
    const phone = document.getElementById('form-phone').value.trim();
    if (!phone) { showToast('Введите телефон для подтверждения', false); return; }
    if (!state.selectedSlot) return;

    state.submitting = true;
    const btn = document.getElementById('confirm-btn');
    const btnText = document.getElementById('confirm-btn-text');
    btn.disabled = true;
    btnText.textContent = 'Отправка...';

    const tg = window.Telegram?.WebApp;
    const user = tg?.initDataUnsafe?.user || {};
    const today = new Date();

    const data = {
        event: 'booking_submit',
        user_id: user.id || 'unknown',
        username: user.username || '',
        first_name: user.first_name || '',
        timestamp: new Date().toISOString(),
        booking: {
            booking_id: `BK_${Date.now()}_${Math.random().toString(36).substr(2,6).toUpperCase()}`,
            child: document.getElementById('form-child').value,
            section: CONFIG.bookingSection,
            trainer: CONFIG.bookingTrainer,
            date: `${today.getDate()}.${today.getMonth()+1}.${today.getFullYear()}`,
            time: state.selectedSlot,
            phone: phone,
            comment: document.getElementById('form-comment').value.trim() || null
        }
    };

    fetch(CONFIG.backendUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
        mode: 'no-cors'
    })
    .then(() => {
        state.submitting = false;
        state.submitted = true;
        btn.disabled = false;
        updateBookingForm();
        showToast(`<strong>${document.getElementById('form-child').value}</strong> записан на ${state.selectedSlot}`, true);
    })
    .catch(err => {
        console.error(err);
        state.submitting = false;
        btn.disabled = false;
        btnText.textContent = `Записать на ${state.selectedSlot}`;
        showToast('Ошибка. Попробуйте ещё раз', false);
    });
}

// ── TOAST ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(html, success = true) {
    const toast = document.getElementById('toast');
    const icon  = toast.querySelector('.toast-icon');
    const text  = document.getElementById('toast-text');
    icon.textContent = success ? '✓' : '!';
    icon.style.color = success ? 'var(--lime)' : '#ff6b6b';
    toast.style.borderColor = success ? 'var(--lime)' : '#ff6b6b';
    text.innerHTML = html;
    toast.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('visible'), 4000);
}

// ── INIT ──────────────────────────────────────────────────────────────
function init() {
    renderHome();
    renderSchedule();
    // trainer & booking rendered on demand
}

document.addEventListener('DOMContentLoaded', init);
</script>
