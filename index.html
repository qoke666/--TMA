<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SMOKE&BUN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           SMOKE&BUN — CRAFT BURGER THEME
           Палитра:
             --kraft        #2B2017  тёмный обожжённый дуб (фон)
             --kraft-light  #3A2C1F  фон карточек/панелей
             --paper        #EFE3CC  крафт-бумага (текст/светлые поверхности)
             --char         #1A1410  глубокая угольная тень
             --fire         #C1462C  томатно-перечный красный (основной акцент)
             --ember        #E08A3C  тлеющий уголь / горчично-оранжевый (второй акцент)
           ============================================================ */
        :root {
            --kraft: #2B2017;
            --kraft-light: #3A2C1F;
            --char: #1A1410;
            --paper: #EFE3CC;
            --fire: #C1462C;
            --fire-bright: #DD5A3C;
            --ember: #E08A3C;
            --font-display: 'Archivo Black', sans-serif;
            --font-body: 'Oswald', sans-serif;
        }

        body {
            font-family: var(--font-body);
            overscroll-behavior: none;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            background-color: var(--kraft);
            background-image:
                radial-gradient(ellipse at top, rgba(193,70,44,0.10), transparent 60%),
                repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
            color: var(--paper);
            position: relative;
        }

        #tsparticles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* --- Animations: warmer, snappier, with slight overshoot (grill "sizzle") --- */
        .animate-zoom-in { animation: zoomIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        .animate-pop { animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1) forwards; }
        @keyframes zoomIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.7) rotate(-2deg); opacity: 0; } 60% { transform: scale(1.05) rotate(1deg); opacity: 1; } to { transform: scale(1) rotate(0); opacity: 1; } }

        h1, h2, h3, h4, .header-title {
            font-family: var(--font-display);
            color: var(--paper);
            letter-spacing: 0.02em;
        }

        /* Promo Carousel */
        .carousel { display: flex; overflow-x: auto; white-space: nowrap; scroll-behavior: smooth; touch-action: pan-x; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; scrollbar-width: none; -ms-overflow-style: none; position: relative; width: 343px; height: 136px; margin: 8px auto; border-radius: 10px; overflow: hidden; max-width: 100%; border: 2px solid rgba(224,138,60,0.35); }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel a { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity .6s ease, transform 6s linear; transform: scale(1); }
        .carousel a.active { opacity: 1; z-index: 1; transform: scale(1.06); }
        .carousel img { width: 100%; height: 100%; object-fit: cover; display: block; filter: saturate(1.05) contrast(1.05); }
        .carousel .hot { position: absolute; top: 8px; left: 16px; font-size: 20px; font-weight: 500; color: #ffffff; z-index: 2; }
        .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 2; }
        .carousel-dots .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.25); cursor: pointer; transition: background .3s, transform .3s; }
        .carousel-dots .dot.active { background: var(--ember); transform: scale(1.3); }

        /* Product Image Carousel */
        .product-image-carousel { position: relative; width: 100%; height: 288px; overflow: hidden; border-radius: 14px; background: var(--kraft-light); margin-bottom: 16px; border: 2px solid rgba(224,138,60,0.25); }
        .product-image-carousel img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity .4s ease, transform .4s cubic-bezier(.22,.9,.32,1); transform: translateX(0); }
        .product-image-carousel img.active { opacity: 1; z-index: 1; transform: translateX(0); }
        .product-image-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 2; }
        .product-image-dots .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background .3s; }
        .product-image-dots .dot.active { background: var(--paper); }

        /* Modals & Backdrop */
        .cart-modal, .product-detail, .profile-modal { height: 100dvh; max-height: 100dvh; overflow-y: auto; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(10,7,5,0.55); backdrop-filter: blur(4px); z-index: 90; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
        .modal-backdrop.visible { opacity: 1; pointer-events: auto; }

        #cart-modal, #product-detail, #profile-modal, #checkout-modal { z-index: 100; }
        #checkout-modal { z-index: 102; }

        /* --- Header --- */
        .header-elements { position: fixed; top: 0; left: 0; right: 0; z-index: 130; padding: 0; height: 56px; background: transparent; box-shadow: none; transition: opacity .25s ease, transform .25s cubic-bezier(.22,.9,.32,1); display: block; pointer-events: auto; }
        .header-elements.header-hidden { opacity: 0; transform: translateY(-14px); pointer-events: none; }
        .header-elements .cart-edge { position: absolute; left: 12px; top: 12px; z-index: 140; }
        .header-elements .header-title { position: absolute; left: 50%; top: 14px; transform: translateX(-50%); z-index: 135; font-size: 20px; font-weight: 400; color: var(--paper); }
        .header-elements .social-edge { position: absolute; right: 12px; top: 10px; z-index: 140; display: flex; gap: 10px; align-items: center; }
        .header-elements .icon-btn, .header-elements .social-edge a { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; transition: background-color .15s, transform .15s; background: transparent; border: none; }
        .header-elements .icon-btn i, .header-elements .social-edge i, .header-elements .icon-btn svg { font-size: 18px; line-height: 1; color: var(--ember); transition: color 0.2s; }
        .header-elements .icon-btn:hover, .header-elements .social-edge a:hover { transform: translateY(-2px) rotate(-3deg); }
        .header-elements .icon-btn:hover i, .header-elements .social-edge a:hover i, .header-elements .icon-btn:hover svg { color: var(--paper); }
        #cart-badge { background-color: var(--fire) !important; color: var(--paper) !important; }

        /* --- Main Content --- */
        main h2 { color: var(--paper); }
        main #products-count { color: rgba(239, 227, 204, 0.55); font-family: var(--font-body); }

        /* --- Category chips --- */
        .category-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; margin-bottom: 4px; }
        .category-chips::-webkit-scrollbar { display: none; }
        .category-chip { flex-shrink: 0; padding: 8px 16px; border-radius: 100px; border: 1.5px solid rgba(224,138,60,0.35); background: var(--kraft-light); color: var(--paper); font-size: 13px; font-weight: 500; white-space: nowrap; transition: all 0.2s ease; cursor: pointer; }
        .category-chip.active { background: var(--fire); border-color: var(--fire); color: var(--paper); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(193,70,44,0.4); }

        /* --- Product Card --- */
        .product-card {
            background-color: var(--kraft-light);
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            border: 1px solid rgba(224, 138, 60, 0.18);
            transition: transform 0.25s cubic-bezier(.22,.9,.32,1), border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .product-card:hover {
            transform: translateY(-5px) rotate(-0.4deg);
            border-color: rgba(224, 138, 60, 0.55);
            box-shadow: 0 10px 28px rgba(0,0,0,0.35);
        }
        .product-card .relative.h-36 { border-radius: 10px 10px 0 0; }
        .product-card h3 { color: var(--paper); font-family: var(--font-display); font-size: 0.95rem; letter-spacing: 0.01em; }
        .product-card p { color: rgba(239, 227, 204, 0.65); height: auto; min-height: 40px; font-size: 0.8rem; }
        .product-card .font-bold {
            color: var(--ember);
            font-size: 1.05rem;
            font-family: var(--font-display);
        }
        .hot-badge { background: var(--fire); color: var(--paper); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; font-family: var(--font-body); letter-spacing: 0.05em; transform: rotate(-3deg); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

        .add-to-cart-btn {
            position: absolute;
            bottom: 12px; right: 12px;
            width: 40px; height: 40px;
            background-color: rgba(26,20,16,0.35);
            border-radius: 50%;
            box-shadow: none;
            transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
            border: 1.5px solid rgba(224,138,60,0.4);
            z-index: 10;
        }
        .add-to-cart-btn svg {
            width: 22px; height: 22px;
            stroke: var(--ember);
            transition: stroke 0.2s ease;
        }
        .add-to-cart-btn:hover {
            transform: scale(1.18) rotate(90deg);
            background-color: var(--fire);
            border-color: var(--fire);
        }
        .add-to-cart-btn:hover svg {
            stroke: var(--paper);
        }
        .add-to-cart-btn:active { transform: scale(0.92) rotate(90deg); }

        /* --- Buttons & Inputs --- */
        .btn-primary {
            transition: all 0.2s cubic-bezier(.22,.9,.32,1);
            box-shadow: 0 3px 0 #7e2c1a, 0 4px 10px rgba(0,0,0,0.3);
            background-color: var(--fire);
            color: var(--paper);
            border-radius: 8px;
            font-family: var(--font-body);
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 0.92rem;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 0 #7e2c1a, 0 8px 16px rgba(0,0,0,0.35); background-color: var(--fire-bright); }
        .btn-primary:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 1px 0 #7e2c1a, 0 2px 6px rgba(0,0,0,0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .quantity-btn {
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(239, 227, 204, 0.08);
            border: 1px solid rgba(224,138,60,0.3);
            color: var(--paper);
            transition: background 0.2s, transform 0.15s;
        }
        .quantity-btn:hover { background: rgba(224,138,60,0.2); transform: scale(1.08); }
        .quantity-btn:active { transform: scale(0.9); }
        .quantity-btn svg { width: 16px; height: 16px; }

        .size-btn, .filling-btn {
            background-color: transparent;
            border: 1.5px solid rgba(224, 138, 60, 0.35);
            color: var(--paper);
            transition: background-color 0.2s, border-color 0.2s, transform 0.15s;
            border-radius: 8px;
        }
        .size-btn:active, .filling-btn:active { transform: scale(0.97); }
        .size-btn .text-gray-600, .filling-btn .text-gray-600 { color: rgba(239, 227, 204, 0.55); }

        .size-btn.active, .filling-btn.active {
            background-color: rgba(193, 70, 44, 0.22);
            border-color: var(--fire);
            box-shadow: 0 0 0 1px var(--fire) inset;
        }

        .input-field {
            background-color: var(--kraft-light);
            border: 1.5px solid rgba(224, 138, 60, 0.3);
            color: var(--paper);
            border-radius: 8px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-field:focus {
            border-color: var(--ember);
            outline: none;
            box-shadow: 0 0 0 3px rgba(224,138,60,0.18);
        }
        label.font-semibold { color: var(--paper); }

        /* --- Modals Redesign --- */
        #cart-modal, #product-detail, #profile-modal {
            background-color: var(--kraft);
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(.22,.9,.32,1);
        }
        .sticky.top-0 {
            background-color: var(--kraft) !important;
            border-bottom: 1px solid rgba(224, 138, 60, 0.2) !important;
            box-shadow: none !important;
        }
        .sticky.bottom-0 {
            background-color: var(--kraft) !important;
            border-top: 1px solid rgba(224, 138, 60, 0.2) !important;
        }

        /* Cart Empty State */
        #cart-content .text-gray-800 { color: var(--paper) !important; }
        #cart-content .text-gray-600 { color: rgba(239, 227, 204, 0.65) !important; }
        #cart-content svg { color: var(--ember); }

        /* Cart Item */
        .cart-item {
            background-color: var(--kraft-light) !important;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid rgba(224,138,60,0.12);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .cart-item h4 { color: var(--paper); }
        .cart-item .text-pink-600 { color: var(--ember) !important; }
        .cart-item.removing { transform: translateX(40px) scale(0.92); opacity: 0; }

        /* Checkout Modal */
        #checkout-modal {
            position: fixed; left: 0; right: 0; bottom: 0;
            z-index: 102; transform: translateY(110%); transition: transform .35s cubic-bezier(.22,.9,.32,1);
            background: var(--kraft);
            border-top: 2px solid rgba(224, 138, 60, 0.4);
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            box-shadow: 0 -8px 28px rgba(0,0,0,0.4);
            max-height: 85vh; overflow: auto;
        }
        #checkout-modal.open { transform: translateY(0); }
        #checkout-modal .border-b { border-color: rgba(224, 138, 60, 0.2); }
        #checkout-modal .text-gray-600 { color: rgba(239, 227, 204, 0.65); }
        #checkout-total { color: var(--ember) !important; font-family: var(--font-display); }
        #checkout-back-btn, .cart-list-actions button {
            background-color: transparent;
            border: 1.5px solid var(--ember);
            color: var(--ember);
            border-radius: 8px;
            transition: background-color 0.2s, color 0.2s, transform 0.15s;
            font-weight: 500;
        }
        #checkout-back-btn:hover, .cart-list-actions button:hover {
            background-color: rgba(224, 138, 60, 0.12);
        }
        #checkout-back-btn:active, .cart-list-actions button:active { transform: scale(0.97); }

        #cart-content .cart-list { max-height: calc(100vh - 220px); overflow: auto; padding: 1rem; }

        /* fly-to-cart image */
        .fly-img { position: fixed; pointer-events: none; z-index: 2200; transition: transform 0.75s cubic-bezier(.18,.85,.25,1), opacity 0.55s ease 0.25s; will-change: transform, opacity; border-radius: 10px; box-shadow: 0 10px 24px rgba(0,0,0,0.4); }

        main {
            padding-top: 60px;
        }
        #cart-modal, #product-detail, #profile-modal {
            padding-top: 60px;
        }
        .header-elements {
            top: 60px;
        }
        .sticky.top-0 {
            top: 60px !important;
        }

        /* Profile Modal Styles */
        #profile-modal .profile-content {
            padding: 16px;
            text-align: center;
        }
        #profile-points {
            font-size: 2.2rem;
            color: var(--ember);
            margin: 16px 0;
            font-family: var(--font-display);
        }

        #loyalty-discount {
            color: var(--ember);
        }
        #use-points-checkbox {
            margin-right: 8px;
            accent-color: var(--fire);
        }

        /* Notification toast pop */
        .toast-pop { animation: toastPop 0.4s cubic-bezier(.34,1.56,.64,1) forwards; }
        @keyframes toastPop { from { transform: translate(-50%, 16px) scale(0.85); opacity: 0; } to { transform: translate(-50%, 0) scale(1); opacity: 1; } }
    </style>
</head>
<body class="relative">
    <div id="tsparticles"></div>

    <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true"></div>

    <main class="pt-24 pb-20 px-4 max-w-7xl mx-auto relative">
        <div class="header-elements" id="top-bar">
             <div class="cart-edge">
                 <button id="cart-btn" class="icon-btn p-0 hover:bg-transparent rounded-md" aria-label="Корзина">
                     <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                     </svg>
                     <span id="cart-badge" class="absolute -top-1 -right-1 bg-pink-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                 </button>
             </div>

             <div class="header-title">SMOKE&BUN</div>

             <div class="social-edge">
                 <div class="social-links flex items-center gap-3">
                     <button id="profile-btn" class="icon-btn" title="Профиль">
                         <i class="fas fa-user"></i>
                     </button>
                     <!-- TODO: вставить ссылку на Telegram-канал/бот бургерной -->
                     <a href="#" target="_blank" class="icon-btn" data-social="telegram" title="Telegram">
                         <i class="fab fa-telegram-plane"></i>
                     </a>
                     <!-- TODO: вставить ссылку на Instagram бургерной -->
                     <a href="#" target="_blank" class="icon-btn" data-social="instagram" title="Instagram">
                         <i class="fab fa-instagram"></i>
                     </a>
                 </div>
             </div>
        </div>

        <!-- TODO: заменить промо-баннеры на свои (акции бургерной) -->
        <div class="carousel">
            <a href="#" class="active"><img src="https://placehold.co/686x272/2B2017/E08A3C?text=%D0%9D%D0%BE%D0%B2%D0%BE%D0%B5+%D0%BE%D0%B3%D0%BD%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5+%D0%9A%D0%9E%D0%9C%D0%91%D0%9E" alt="promo"></a>
            <a href="#"><img src="https://placehold.co/686x272/2B2017/C1462C?text=%D0%92%D1%82%D0%BE%D1%80%D0%BE%D0%B9+%D0%B1%D1%83%D1%80%D0%B3%D0%B5%D1%80+%D0%B2+%D0%BF%D0%BE%D0%B4%D0%B0%D1%80%D0%BE%D0%BA" alt="promo2"></a>
            <div class="hot"></div>
            <div class="carousel-dots"><div class="dot active"></div><div class="dot"></div></div>
        </div>

        <div class="category-chips" id="category-chips"></div>

        <div class="flex items-center justify-between my-5">
            <h2 class="text-xl font-bold">Меню</h2>
            <span id="products-count" class="text-sm">0 товаров</span>
        </div>
        <div id="products-grid" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4 mb-10"></div>
    </main>

    <div id="cart-modal" class="fixed inset-0 transform transition-transform duration-300" aria-hidden="true">
        <div class="flex flex-col h-full">
            <div class="flex items-center justify-between p-4 border-b sticky top-0">
                <button id="cart-back-btn" aria-label="Назад">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="text-xl font-bold">Корзина</h2>
                <button id="cart-close-btn" aria-label="Закрыть">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="cart-content" class="flex-grow flex flex-col"></div>
        </div>
    </div>

    <div id="product-detail" class="fixed inset-0 transform transition-transform duration-300" aria-hidden="true">
        <div class="flex flex-col h-full">
            <div class="flex items-center justify-between p-4 border-b sticky top-0">
                <button id="detail-back-btn" aria-label="Назад">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 id="detail-title" class="text-xl font-bold"></h2>
                <button id="detail-close-btn" aria-label="Закрыть">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="detail-content" class="flex-1 overflow-auto p-4"></div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 transform transition-transform duration-300" aria-hidden="true">
        <div class="flex flex-col h-full">
            <div class="flex items-center justify-between p-4 border-b sticky top-0">
                <button id="profile-back-btn" aria-label="Назад">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>

            if (appState.cart.length === 0) {
                cartContent.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-center p-6"> <svg class="w-20 h-20 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l-1 12H6L5 9z"/></svg> <p class="text-xl font-semibold text-gray-800">Корзина пуста</p><p class="text-sm text-gray-600">Самое время заказать что-нибудь горячее</p> <button onclick="closeCart()" class="btn-primary mt-4 p-3 text-base font-semibold">Открыть меню</button> </div>`;
                return;
            }
            cartContent.innerHTML = ` <div class="cart-list"> ${appState.cart.map(item => { const product = products.find(p => p.id === item.id) || {}; const size = product.sizes ? product.sizes.find(s => s.size === item.selectedSize) : null; const price = size ? size.price : item.price; const sizeLabel = size ? size.label : null; const fillingText = item.selectedFilling ? `, ${item.selectedFilling}` : ''; return `<div class="cart-item animate-fade-in flex gap-4 p-4 mb-3" data-cart-key="${item.id}|${item.selectedSize ?? ''}|${item.selectedFilling ?? ''}"> <img src="${item.cartImage || 'https://placehold.co/150x150/3A2C1F/EFE3CC?text=%3F'}" alt="${item.name}" class="w-20 h-20 object-cover rounded-lg flex-shrink-0"> <div class="flex-1 min-w-0"> <h4 class="line-clamp-1 mb-1 font-semibold text-base">${item.name}${sizeLabel ? ` (${sizeLabel}${fillingText})` : (fillingText ? ` (${item.selectedFilling})` : '')}</h4> <p class="text-sm text-pink-600 font-semibold mb-2">${price} ₽ × ${item.quantity} = ${price * item.quantity} ₽</p> <div class="flex items-center justify-between"> <div class="flex items-center gap-3"> <button class="quantity-btn" onclick="updateCartQuantity('${item.id}', ${item.quantity - 1}, '${item.selectedSize ?? ''}', '${item.selectedFilling ?? ''}')">-</button> <span class="w-8 text-center font-semibold text-base">${item.quantity}</span> <button class="quantity-btn" onclick="updateCartQuantity('${item.id}', ${item.quantity + 1}, '${item.selectedSize ?? ''}', '${item.selectedFilling ?? ''}')">+</button> </div> <button onclick="removeFromCart('${item.id}', '${item.selectedSize ?? ''}', '${item.selectedFilling ?? ''}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg"> <svg class="icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> </button> </div> </div> </div>`; }).join('')} </div> <div class="border-t p-4 sticky bottom-0 cart-list-actions"> <div class="flex justify-between items-center mb-3"> <div> <div class="text-sm">Товаров: <strong>${appState.cart.length}</strong></div> </div> <div class="text-right"> <div class="text-sm">Итого</div> <div class="text-lg font-bold" style="color: var(--ember);">${totalAmount} ₽</div> </div> </div> <div class="grid grid-cols-2 gap-3"> <button id="checkout-open-btn" class="btn-primary col-span-2 w-full h-12 text-base font-semibold">Перейти к оформлению</button> <button onclick="clearCart()" class="col-span-1 w-full h-12">Очистить</button> <button onclick="closeCart()" class="col-span-1 w-full h-12">Продолжить покупки</button> </div> </div>`;
            const checkoutBtn = document.getElementById('checkout-open-btn');
            if (checkoutBtn) { checkoutBtn.addEventListener('click', () => { openCheckout(); }); }
        }
        function openProductDetailById(productId) {
            const product = products.find(p => p.id === productId); if (!product) return;
            appState.selectedProduct = product; appState.selectedSize = product.sizes ? 'single' : null; appState.selectedFilling = product.fillings ? product.fillings[0].name : null; appState.productImageIndex = 0; appState.detailQuantity = 1;
            elements.detailTitle.textContent = product.name; modalState.detail = true; updateHeaderVisibility();
            elements.productDetail.style.transform = 'translateY(0)'; elements.productDetail.setAttribute('aria-hidden', 'false'); renderProductDetail();
        }
        function closeProductDetail() { modalState.detail = false; elements.productDetail.style.transform = 'translateY(100%)'; elements.productDetail.setAttribute('aria-hidden', 'true'); appState.detailQuantity = 1; setTimeout(updateHeaderVisibility, 50); }
        function selectSize(size) { appState.selectedSize = size; renderProductDetail(); }
        function selectFilling(filling) { appState.selectedFilling = filling; renderProductDetail(); }
        function renderProductDetail() {
            if (!appState.selectedProduct) return;
            const product = appState.selectedProduct; const size = product.sizes ? product.sizes.find(s => s.size === appState.selectedSize) : null; const price = size ? size.price : product.price;
            elements.detailContent.innerHTML = `<div class="product-image-carousel">${product.images.map((img, i) => `<img src="${img}" alt="${product.name}" class="${i === 0 ? 'active' : ''}">`).join('')}<div class="product-image-dots">${product.images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('')}</div></div> <div class="space-y-4"><h1 class="text-xl font-bold">${product.name}</h1> ${product.sizes ? `<div class="space-y-2"><h3 class="font-semibold text-base">Размер порции</h3><div class="grid grid-cols-2 gap-3">${product.sizes.map(s => `<button class="size-btn p-3 border ${appState.selectedSize === s.size ? 'active' : ''} text-left" onclick="selectSize('${s.size}')"><div class="font-semibold text-sm">${s.label}</div><div class="text-xs text-gray-600">${s.weight} / ${s.price} ₽</div></button>`).join('')}</div><p class="text-sm">${product.included || ''}</p><p class="text-sm">${product.extra || ''}</p></div>` : ''} ${product.fillings ? `<div class="space-y-2"><h3 class="font-semibold text-base">Добавки и соусы</h3><div class="grid grid-cols-2 gap-3">${product.fillings.map(f => `<button class="filling-btn p-3 border text-center ${appState.selectedFilling === f.name ? 'active' : ''}" onclick="selectFilling('${f.name}')"><div class="font-semibold text-sm">${f.name}</div></button>`).join('')}</div><div class="mt-2 filling-image-container"><img id="filling-image" src="${product.fillings.find(f => f.name === appState.selectedFilling).image}" alt="${appState.selectedFilling}" class="filling-image rounded-lg w-full"></div></div>` : ''} <div><p class="text-sm">${product.description}</p></div> <div class="space-y-2"><button class="flex items-center justify-between w-full py-2 text-left" onclick="toggleIngredients()"><span class="font-semibold text-base">Состав</span><svg id="ingredients-chevron" class="icon w-5 h-5 transition-transform" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg></button><div id="ingredients-list" class="space-y-1 hidden animate-fade-in">${product.ingredients ? product.ingredients.map(ing => `<div class="text-sm">• ${ing}</div>`).join('') : '<div class="text-sm">Состав отсутствует</div>'}</div></div> <div class="space-y-3 pt-3"><div class="flex items-center justify-center gap-4"><button class="quantity-btn" onclick="changeDetailQuantity(-1)">-</button><span id="detail-quantity" class="font-semibold text-lg">${appState.detailQuantity || 1}</span><button class="quantity-btn" onclick="changeDetailQuantity(1)">+</button></div><button id="detail-add-btn" onclick="addToCartFromDetail()" class="btn-primary w-full h-12 text-base font-semibold">Добавить <span id="detail-total-price">${price}</span> ₽</button></div> </div>`;
            startProductImageCarousel();
        }
        function getFilteredProducts() {
            if (appState.activeCategory === 'all') return products;
            return products.filter(p => p.category === appState.activeCategory);
        }
        function renderProducts() {
            const filtered = getFilteredProducts();
            elements.productsCount.textContent = `${filtered.length} товаров`;
            elements.productsGrid.innerHTML = filtered.map(renderProductCard).join('');
        }
        function renderProductCard(product) {
            const price = product.sizes ? product.sizes.find(s => s.size === 'single').price : product.price;
            return ` <div class="product-card flex flex-col relative animate-fade-in" onclick="openProductDetailById('${product.id}')"> <div class="relative h-36 rounded-t-lg overflow-hidden cursor-pointer"> <img data-product-id="${product.id}" src="${product.cartImage || product.images[0]}" alt="${product.name}" class="w-full h-full object-cover"> ${product.isHot ? `<div class="hot-badge">ОГОНЬ</div>` : ''} </div> <div class="p-4 flex flex-col flex-grow"> <h3 class="font-semibold text-base line-clamp-1 mb-1">${product.name}</h3> <p class="text-sm line-clamp-2 mb-2">${product.description}</p> <div class="flex items-center justify-between mt-auto pt-2"> <div class="flex flex-col"> <span class="font-bold text-base">${price} ₽</span> </div> </div> </div> <button onclick="addToCartById('${product.id}',1,this); event.stopPropagation();" class="add-to-cart-btn" aria-label="Добавить в корзину"> <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg> </button> </div>`;
        }
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `fixed bottom-4 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg text-white font-semibold toast-pop shadow-lg ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            notification.textContent = message; document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }
        function debounce(func, wait) {
            let timeout; return function executedFunction(...args) { const later = () => { clearTimeout(timeout); func(...args); }; clearTimeout(timeout); timeout = setTimeout(later, wait); };
        }
        function openCheckout() {
            modalState.checkout = true; updateHeaderVisibility(); elements.checkoutDate.min = getMinOrderDate(); elements.checkoutDate.value = getMinOrderDate(); updateCheckoutTotal(); elements.checkoutModal.classList.add('open'); elements.checkoutModal.setAttribute('aria-hidden', 'false');
            const telegram = window.Telegram?.WebApp; const user = telegram?.initDataUnsafe?.user || {}; if (user.phone_number && !elements.checkoutPhone.value) elements.checkoutPhone.value = user.phone_number;
        }
        function closeCheckout() {
            modalState.checkout = false; elements.checkoutModal.classList.remove('open'); elements.checkoutModal.setAttribute('aria-hidden', 'true'); setTimeout(updateHeaderVisibility, 50);
        }
        function calculateTotalWithDiscount(totalAmount) {
            if (!appState.usePoints) return { total: totalAmount, discount: 0 };
            const maxDiscount = Math.min(appState.userPoints, Math.floor(totalAmount * 0.3));
            return { total: totalAmount - maxDiscount, discount: maxDiscount };
        }
        function updateCheckoutTotal() {
            const totalAmount = appState.cart.reduce((sum, item) => { const product = products.find(p => p.id === item.id); const size = product && product.sizes ? product.sizes.find(s => s.size === item.selectedSize) : null; return sum + (size ? size.price : item.price) * item.quantity; }, 0);
            const { total, discount } = calculateTotalWithDiscount(totalAmount);
            elements.checkoutTotal.textContent = `${total} ₽`;
            elements.loyaltyDiscount.textContent = `${discount} ₽`;
        }
        function placeOrderFromCheckout() { placeOrder(); }

        /* ============================================================
           ОТПРАВКА ЗАКАЗА
           Сейчас: POST на CONFIG.GOOGLE_APPS_SCRIPT_URL с mode:'no-cors'
           (как и было в исходной версии — рабочая, но "слепая" отправка
           без проверки ответа сервера, раз используется no-cors).
           Если подключаешь ЮKassa: перед фактическим оформлением заказа
           нужно сначала создать платёж на backend (CONFIG.YOOKASSA_CREATE_PAYMENT_URL),
           получить confirmation_url, открыть его пользователю и оформлять
           заказ (или отмечать его оплаченным) только после успешного платежа.
           ============================================================ */
        function placeOrder() {
            const checkoutButton = elements.placeOrderBtnElement; const dateInput = elements.checkoutDate; const timeInput = elements.checkoutTime; const phoneInput = elements.checkoutPhone;
            if (!dateInput.value || !timeInput.value || !phoneInput.value) { showNotification('Заполните все поля', 'error'); return; }
            if (appState.cart.length === 0) { showNotification('Корзина пуста', 'error'); return; }
            checkoutButton.disabled = true;
            checkoutButton.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Заказ формируется...`;
            const totalAmount = appState.cart.reduce((sum, item) => { const product = products.find(p => p.id === item.id); const size = product && product.sizes ? product.sizes.find(s => s.size === item.selectedSize) : null; return sum + (size ? size.price : item.price) * item.quantity; }, 0);
            const { total: finalAmount, discount } = calculateTotalWithDiscount(totalAmount);
            const telegram = window.Telegram?.WebApp; const user = telegram?.initDataUnsafe?.user || {};
            const orderData = {
                event: 'order_submit', user_id: user.id || 'unknown', username: user.username || '', first_name: user.first_name || '', last_name: user.last_name || '', timestamp: new Date().toISOString(), url: window.location.href, userAgent: navigator.userAgent,
                additional: {
                    order_id: `ORDER_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`, order_details: appState.cart.map(item => ({ id: item.id, name: item.name, price: products.find(p => p.id === item.id).sizes ? products.find(p => p.id === item.id).sizes.find(s => s.size === item.selectedSize).price : item.price, quantity: item.quantity, size: item.selectedSize, addons: item.selectedFilling || null })), total_amount: totalAmount, delivery_type: 'pickup', delivery_fee: 0, final_amount: finalAmount, date: dateInput.value, time: timeInput.value, address: CONFIG.PICKUP_ADDRESS, phone: phoneInput.value, points_used: discount
                }
            };
            fetch(CONFIG.GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData), mode: 'no-cors'
            })
            .then(() => {
                showNotification('Заказ успешно оформлен! Ожидайте подтверждения.', 'success');
                appState.userPoints -= discount;
                clearCart(); closeCheckout(); closeCart(); checkoutButton.disabled = false; checkoutButton.textContent = 'Оформить заказ';
            })
            .catch(error => {
                console.error('Error sending order:', error); showNotification('Ошибка при отправке заказа', 'error'); checkoutButton.disabled = false; checkoutButton.textContent = 'Оформить заказ';
            });
        }
        function changeDetailQuantity(change) {
            appState.detailQuantity = Math.max(1, (appState.detailQuantity || 1) + change); const el = document.getElementById('detail-quantity');
            if (el) el.textContent = appState.detailQuantity;
            if (appState.selectedProduct) {
                const size = appState.selectedProduct.sizes ? appState.selectedProduct.sizes.find(s => s.size === appState.selectedSize) : null;
                const price = size ? size.price : appState.selectedProduct.price; const totalPriceEl = document.getElementById('detail-total-price');
                if (totalPriceEl) totalPriceEl.textContent = price * appState.detailQuantity;
            }
        }
        function addToCartFromDetail() {
            if (!appState.selectedProduct) return;
            const activeImg = document.querySelector('#detail-content .product-image-carousel img.active');
            addToCartById(appState.selectedProduct.id, appState.detailQuantity || 1, activeImg || null);
            closeProductDetail();
        }
        function toggleIngredients() { const list = document.getElementById('ingredients-list'); const chevron = document.getElementById('ingredients-chevron'); list.classList.toggle('hidden'); chevron.classList.toggle('rotate-180'); }
        function initScrollHide() {
            let lastScrollTop = window.pageYOffset || document.documentElement.scrollTop || 0; let ticking = false; const header = elements.header; const SHOW_NEAR_TOP = 120;
            function onScrollTick() {
                const st = window.pageYOffset || document.documentElement.scrollTop || 0;
                if (modalState.cart || modalState.detail || modalState.checkout || modalState.profile) { header.classList.add('header-hidden'); lastScrollTop = st; ticking = false; return; }
                if (st <= SHOW_NEAR_TOP) { header.classList.remove('header-hidden'); } else { if (st > lastScrollTop && st > 40) { header.classList.add('header-hidden'); } else { header.classList.remove('header-hidden'); } }
                lastScrollTop = st <= 0 ? 0 : st; ticking = false;
            }
            window.addEventListener('scroll', function() { if (!ticking) { window.requestAnimationFrame(onScrollTick); ticking = true; } }, { passive: true });
            if ((window.pageYOffset || document.documentElement.scrollTop || 0) <= SHOW_NEAR_TOP) { header.classList.remove('header-hidden'); }
        }
        function openProfile() {
            modalState.profile = true; updateHeaderVisibility(); elements.profileModal.style.transform = 'translateY(0)'; elements.profileModal.setAttribute('aria-hidden', 'false'); fetchUserPoints();
        }
        function closeProfile() {
            modalState.profile = false; elements.profileModal.style.transform = 'translateY(100%)'; elements.profileModal.setAttribute('aria-hidden', 'true'); setTimeout(updateHeaderVisibility, 50);
        }
        function fetchUserPoints() {
            const telegram = window.Telegram?.WebApp; const user = telegram?.initDataUnsafe?.user || {}; const user_id = user.id || 'unknown';
            // Запрос баллов лояльности с твоего Google Apps Script backend
            fetch(CONFIG.GOOGLE_APPS_SCRIPT_URL + '?event=get_points&user_id=' + user_id, { method: 'GET', mode: 'no-cors' })
            .then(response => response.json())
            .then(data => {
                appState.userPoints = data.points || 0;
                elements.profilePoints.textContent = appState.userPoints;
            })
            .catch(() => {
                elements.profilePoints.textContent = 'Ошибка загрузки';
            });
        }
        function init() {
            const savedCart = localStorage.getItem('cart');
            if (savedCart) { try { const parsedCart = JSON.parse(savedCart); if (Array.isArray(parsedCart)) appState.cart = parsedCart; } catch (e) { console.error('Could not parse cart from localStorage'); } }
            initEventListeners(); renderProducts(); updateCartBadge(); fetchUserPoints();
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
